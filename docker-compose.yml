version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    # Les ports sont commentés/supprimés car le cloud mapping est automatique
    # ports:
    #   - "8000:8000" 
    
    # Remplacer le volume de développement par un volume persistant pour les données
    volumes:
      # Volume nommé pour persister jobs.json
      - jobs_data:/app/jobs.json
      # Optionnel : Montage du code pour le débogage, peut être retiré en prod pure
      # - ./backend:/app 
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    # Les ports sont commentés/supprimés car le cloud mapping est automatique
    # Le frontend écoute maintenant le port 80 (Nginx)
    # ports:
    #   - "80:80" 
      
    # Retirer les volumes de développement/node_modules
    # Nginx sert les fichiers statiques générés DANS le conteneur
    # volumes:
    #   - ./frontend:/app 
    #   - frontend_node_modules:/app/node_modules
    
    environment:
      # Le frontend utilise le nom du service Docker (backend) pour communiquer sur le réseau interne
      # Le port est celui que le backend écoute (8000).
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: always

volumes:
  # Déclaration du volume pour les données du backend (jobs.json)
  jobs_data:
  # frontend_node_modules: (Plus nécessaire avec Nginx)